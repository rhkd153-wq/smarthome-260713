# Netlify 배포 설정 — 별도 빌드가 필요 없는 정적 사이트
[build]
  publish = "."

# 자원은 매번 재검증 — 업데이트가 즉시 반영되도록 (파일명 고정 방식이므로)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# HTML도 항상 재검증
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
